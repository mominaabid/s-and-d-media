<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Login — S&D Media Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #16151A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    /* Background effect */
    body::before {
      content: '';
      position: absolute;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(205,255,0,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: absolute;
      bottom: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(79,142,247,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-box {
      background: #1E1D23;
      border: 1px solid rgba(255,255,255,0.08);
      border-top: 2px solid #CDFF00;
      border-radius: 16px;
      padding: 44px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 44px; height: 44px;
      background: #CDFF00;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 15px;
      color: #16151A;
    }

    .login-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      color: #F0EFFF;
    }

    .login-sub { font-size: 12px; color: #6B698A; margin-top: 2px; }

    h2 {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #F0EFFF;
      margin-bottom: 6px;
    }

    .sub { font-size: 13px; color: #6B698A; margin-bottom: 28px; }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #A8A6C0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap i {
      position: absolute;
      left: 14px; top: 50%; transform: translateY(-50%);
      color: #6B698A;
      font-size: 14px;
    }

    input {
      width: 100%;
      background: #252430;
      border: 1px solid rgba(255,255,255,0.1);
      color: #F0EFFF;
      border-radius: 10px;
      padding: 12px 14px 12px 42px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #CDFF00;
      box-shadow: 0 0 0 3px rgba(205,255,0,0.08);
    }

    .error {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.25);
      border-radius: 10px;
      padding: 12px 16px;
      color: #F87171;
      font-size: 13px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      width: 100%;
      background: #CDFF00;
      color: #16151A;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.18s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 24px;
    }

    .btn:hover { background: #d9ff1a; transform: translateY(-1px); }

    .hint {
      text-align: center;
      font-size: 12px;
      color: #6B698A;
      margin-top: 20px;
    }
  </style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">
    <div class="logo-icon">S&D</div>
    <div>
      <div class="login-title">S&D Media</div>
      <div class="login-sub">Admin Panel</div>
    </div>
  </div>

  <h2>Welcome back</h2>
  <p class="sub">Sign in to your admin account</p>

  {% if error %}
  <div class="error"><i class="fa-solid fa-circle-exclamation"></i> {{ error }}</div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="form-group">
      <label>Username</label>
      <div class="input-wrap">
        <i class="fa-solid fa-user"></i>
        <input type="text" name="username" placeholder="Enter username" autofocus required />
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <i class="fa-solid fa-lock"></i>
        <input type="password" name="password" placeholder="Enter password" required />
      </div>
    </div>
    <button type="submit" class="btn">
      <i class="fa-solid fa-right-to-bracket"></i> Sign In
    </button>
  </form>

 
</div>
</body>
</html>
